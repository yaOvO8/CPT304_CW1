<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Orders - BizTrack</title>
</head>
<body data-page-title-key="titles.orders">
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <button type="button" class="icon-button sidebar-close" data-i18n-aria-label="common.closeSidebar" aria-label="Close sidebar" onclick="closeSidebar()">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="nav.dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="nav.products">Products</span>
                </a>
            </li>
            <li class="active">
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="nav.orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="nav.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="nav.help">Help</span>
                </a>
            </li>
            <li>
                <a href="./privacy.html">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span data-i18n="nav.privacy">Privacy Policy</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="nav.about">Meet the Developer</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-wrapper">
            <div class="header-tools">
                <button type="button" class="menu-icon icon-button header-tool-button" data-i18n-aria-label="common.openSidebar" aria-label="Open sidebar" onclick="openSidebar()">
                    <i class="fa-solid fa-bars" aria-hidden="true"></i>
                </button>
                <div class="language-picker language-picker--header">
                    <button type="button" id="language-toggle" class="language-toggle language-toggle--header" data-i18n-aria-label="common.language" aria-label="Language" aria-expanded="false">
                        <span class="language-toggle__icon language-toggle__icon--header"><i class="fa-solid fa-globe" aria-hidden="true"></i></span>
                        <span id="current-language-code" class="language-toggle__code language-toggle__code--header">EN</span>
                    </button>
                    <div id="language-menu" class="language-menu language-menu--header" role="menu">
                        <button type="button" data-language-option="en" class="language-option" role="menuitem">English</button>
                        <button type="button" data-language-option="zh" class="language-option" role="menuitem">中文</button>
                        <button type="button" data-language-option="fr" class="language-option" role="menuitem">Français</button>
                        <button type="button" data-language-option="ja" class="language-option" role="menuitem">日本語</button>
                    </div>
                </div>
            </div>
            <div class="header-title">
                <!-- <span>Primary</span> -->
                <h2 data-i18n="titles.orders">Orders</h2>
            </div>
                <div class="user-info">
                <div class="search-box">
                    <label class="sr-only" for="searchInput" data-i18n="orders.searchLabel">Search orders</label>
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" data-i18n-placeholder="orders.searchPlaceholder" placeholder="Search">
                </div>
                <!-- <i class="fas fa-user-alt fa-xl"></i> -->
            </div>
        </div>

        <div class="table-wrapper">
            <div class="product-title">
                <h3 class="main-title" data-i18n="titles.orders">Orders</h3>
                <div class="order-button">
                    <button class="add-button" data-i18n="orders.addOrder" onclick="openForm()">Add Order</button>
                    <button class="download-button" data-i18n="orders.exportCsv" onclick="exportToCSV()">Export to CSV</button>
                </div>
            </div>
            <div id="action-feedback" class="page-feedback" role="status" aria-live="polite" aria-atomic="true"></div>

            <div class="form-popup">
                <form class="form-container" id="order-form" onsubmit="addOrUpdate(event)">
                    <div class="form-columns">

                        <div class="order-first-col">
                            <label for="order-id"><b data-i18n="orders.orderId">Order ID</b><b>: </b></label>
                            <input type="text" id="order-id" placeholder="1001" required>

                            <label for="order-date"><b data-i18n="orders.orderDate">Order Date</b><b>: </b></label>
                            <input type="date" id="order-date" required>

                            <label for="item-name"><b data-i18n="orders.itemName">Item Name</b><b>: </b></label>
                            <select name="item-name" id="item-name" required>
                                <option value="" disabled selected hidden data-i18n="orders.chooseItem">Choose an item</option>
                                <optgroup label="Hats" data-i18n-label="dynamic.category.hats">
                                    <option value="Baseball caps" data-i18n="dynamic.product.baseballCaps">Baseball caps</option>
                                    <option value="Snapbacks" data-i18n="dynamic.product.snapbacks">Snapbacks</option>
                                    <option value="Beanies" data-i18n="dynamic.product.beanies">Beanies</option>
                                    <option value="Bucket hats" data-i18n="dynamic.product.bucketHats">Bucket hats</option>
                                </optgroup>
                                <optgroup label="Drinkware" data-i18n-label="dynamic.category.drinkware">
                                    <option value="Mugs" data-i18n="dynamic.product.mugs">Mugs</option>
                                    <option value="Water bottles" data-i18n="dynamic.product.waterBottles">Water bottles</option>
                                    <option value="Tumblers" data-i18n="dynamic.product.tumblers">Tumblers</option>
                                </optgroup>   
                                <optgroup label="Clothing" data-i18n-label="dynamic.category.clothing">
                                    <option value="T-shirts" data-i18n="dynamic.product.tshirts">T-shirts</option>
                                    <option value="Sweatshirts" data-i18n="dynamic.product.sweatshirts">Sweatshirts</option>
                                    <option value="Hoodies" data-i18n="dynamic.product.hoodies">Hoodies</option>
                                </optgroup>   
                                <optgroup label="Accessories" data-i18n-label="dynamic.category.accessories">
                                    <option value="Pillow cases" data-i18n="dynamic.product.pillowCases">Pillow cases</option>
                                    <option value="Tote bags" data-i18n="dynamic.product.toteBags">Tote bags</option>
                                    <option value="Stickers" data-i18n="dynamic.product.stickers">Stickers</option>
                                </optgroup>   
                                <optgroup label="Home decor" data-i18n-label="dynamic.category.homeDecor">
                                    <option value="Posters" data-i18n="dynamic.product.posters">Posters</option>
                                    <option value="Framed posters" data-i18n="dynamic.product.framedPosters">Framed posters</option>
                                    <option value="Canvas prints" data-i18n="dynamic.product.canvasPrints">Canvas prints</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="order-second-col">
                            <label for="item-price"><b data-i18n="orders.itemPrice">Item Price</b><b>:</b></label>
                            <input type="number" id="item-price" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="qty-bought"><b data-i18n="orders.quantityBought">Quantity Bought:</b></label>
                            <input type="number" id="qty-bought" placeholder="1" required>

                            <label for="shipping"><b data-i18n="orders.shippingFeeLabel">Shipping fee:</b></label>
                            <input type="number" id="shipping" placeholder="$2.00" min="0.00" max="10000.00" step="0.01" required>
                        </div>

                        <div class="order-third-col">
                            <label for="taxes"><b data-i18n="orders.taxes">Taxes</b><b> (VAT/GST/HST):</b></label>
                            <input type="number" id="taxes" placeholder="$2.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="order-status"><b data-i18n="orders.orderStatus">Order Status</b><b>:</b></label>
                            <select name="order-status" id="order-status" required>
                                <option value="" disabled selected hidden data-i18n="orders.chooseStatus">Choose a status</option>
                                <option value="Pending" class="pending" data-i18n="dynamic.status.pending">Pending</option>
                                <option value="Processing" class="processing" data-i18n="dynamic.status.processing">Processing</option>
                                <option value="Shipped" class="shipped" data-i18n="dynamic.status.shipped">Shipped</option>
                                <option value="Delivered" class="delivered" data-i18n="dynamic.status.delivered">Delivered</option>
                            </select>

                            <label for="order-total"><b data-i18n="orders.totalOrderAmount">Total Order Amount:</b> <small data-i18n="orders.calculated">(Calculated)</small></label>
                            <input type="number" id="order-total" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" disabled>
                        </div>
                    </div>
                    
                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-mode="add" data-i18n="common.add">Add</button>
                        <button type="button" class="btn cancel" data-i18n="common.cancel" onclick="closeForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="order-table">
                    <thead>
                        <tr>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.orderId" data-i18n-aria-label="orders.sort.orderId" aria-label="Sort by order ID" onclick="sortTable('orderID', this)">Order ID</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.orderDate" data-i18n-aria-label="orders.sort.orderDate" aria-label="Sort by order date" onclick="sortTable('orderDate', this)">Order Date</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.itemName" data-i18n-aria-label="orders.sort.itemName" aria-label="Sort by item name" onclick="sortTable('itemName', this)">Item Name</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.itemPrice" data-i18n-aria-label="orders.sort.itemPrice" aria-label="Sort by item price" onclick="sortTable('itemPrice', this)">Item Price</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.quantity" data-i18n-aria-label="orders.sort.quantity" aria-label="Sort by quantity" onclick="sortTable('qtyBought', this)">Qty</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.shippingFee" data-i18n-aria-label="orders.sort.shippingFee" aria-label="Sort by shipping fee" onclick="sortTable('shipping', this)">Shipping Fee</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.taxes" data-i18n-aria-label="orders.sort.taxes" aria-label="Sort by taxes" onclick="sortTable('taxes', this)">Taxes</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.orderTotal" data-i18n-aria-label="orders.sort.orderTotal" aria-label="Sort by order total" onclick="sortTable('orderTotal', this)">Order Total</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-i18n="orders.orderStatus" data-i18n-aria-label="orders.sort.orderStatus" aria-label="Sort by order status" onclick="sortTable('orderStatus', this)">Order Status</button>
                            </th>
                            <th data-i18n="common.action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="10">
                                <div id="total-revenue"></div>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <footer class="site-footer">
                <p data-i18n="footer.storageNotice">BizTrack keeps data in your browser only.</p>
                <div class="site-footer__links">
                    <a href="./privacy.html" data-i18n="footer.privacyPolicy">Privacy Policy</a>
                    <button type="button" class="footer-link-button" data-i18n="footer.cookieSettings" onclick="resetCookieConsent()">Cookie settings</button>
                </div>
            </footer>
        </div>
    </div>

    <script src="./i18n.js"></script>
    <script src="./feedback.js"></script>
    <script src="./orders.js"></script>
    <script src="./cookie-banner.js"></script>
</body>
</html>
